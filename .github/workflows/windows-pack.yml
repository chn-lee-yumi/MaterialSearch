name: Windows Pack

on:
  push:
    branches: [ "windows_pack_test" ]
  workflow_call:

jobs:

  build:
    runs-on: windows-latest
    steps:
      
    - name: Download Python
      run: Invoke-WebRequest "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip" -OutFile python.zip
      
    - name: Unzip Python
      run: mkdir MaterialSearchWindows; Expand-Archive python.zip -DestinationPath MaterialSearchWindows

    - name: Download pip
      run: Invoke-WebRequest "https://bootstrap.pypa.io/pip/pip.pyz" -OutFile pip.pyz
      
    - name: ls
      run: ls

    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: MaterialSearchWindows/MaterialSearch
      
    - name: ls
      run: ls MaterialSearchWindows

    - name: Install requirements
      run: MaterialSearchWindows/python.exe pip.pyz install -r MaterialSearchWindows/MaterialSearch/requirements.txt
    
    - name: ls
      run: ls MaterialSearchWindows
